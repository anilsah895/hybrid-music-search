[alembic]
# Path to migration scripts
script_location = alembic

# Database URL (Postgres + Docker setup)
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/music_search

# Optional but useful: helps avoid import issues
prepend_sys_path = .

# -------------------------
# Logging Configuration
# -------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


[logger_root]
level = WARN
handlers = console


[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine


[logger_alembic]
level = INFO
handlers =
qualname = alembic


[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s